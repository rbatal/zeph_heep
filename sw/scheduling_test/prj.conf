# Console / UART
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Threading / Scheduler
CONFIG_MULTITHREADING=y
# Preemption-priority and Timeslice-Params already set set in the x_heep_defconfig
#   CONFIG_NUM_PREEMPT_PRIORITIES=15
#   CONFIG_TIMESLICE_SIZE=1           # (1ms)
#   CONFIG_TIMESLICE_PRIORITY=0

CONFIG_SCHED_DEADLINE=y     # EDF scheduling
# CAUTION: works with SCHED_SIMPLE and SCHED_SCALABLE but NOT with SCHED_MULTIQ

# Ready-Queue policy (default is SCHED_SIMPLE)
# Select JUST ONE:
#   CONFIG_SCHED_SIMPLE=y     simple unordered list, best for heavy constrained systems
#   CONFIG_SCHED_SCALABLE=y   red-black tree, O(log N), good for many runnable threads
#   CONFIG_SCHED_MULTIQ=y     classic array-of-lists, O(1), incompatible with SCHED_DEADLINE

# Debug / Misc
CONFIG_ASSERT=y
CONFIG_DEBUG=y
