# uart_plic_test project configuration
#
# Most settings come from boards/esl_epfl/x_heep/x_heep_defconfig.
# Only app-specific overrides go here.

# Assertions for test harness
CONFIG_ASSERT=y

# Required by irq_connect_dynamic() used in the PLIC test
CONFIG_DYNAMIC_INTERRUPTS=y

# We manipulate UART INTR_ENABLE directly to stimulate PLIC interrupts,
# so we do NOT enable the Zephyr interrupt-driven UART API here.
CONFIG_UART_INTERRUPT_DRIVEN=n
