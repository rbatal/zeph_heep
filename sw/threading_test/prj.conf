# Console / UART
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Threading
CONFIG_MULTITHREADING=y
CONFIG_EVENTS=y           # k_event requires explicit opt-in
CONFIG_POLL=y             # k_poll requires explicit opt-in

# Debug / Misc
CONFIG_ASSERT=y
CONFIG_DEBUG=y
